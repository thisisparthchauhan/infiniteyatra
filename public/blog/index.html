<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Yatra Blog - Travel Stories & Guides</title>
    <meta name="description"
        content="Explore travel stories, guides, and adventures from Infinite Yatra. Read about trekking, destinations, and travel tips.">
    <meta property="og:title" content="Infinite Yatra Blog">
    <meta property="og:description" content="Travel stories, guides and adventures from Infinite Yatra">
    <meta property="og:url" content="https://blog.infiniteyatra.com">
    <meta property="og:type" content="website">
    <link rel="icon" href="https://infiniteyatra.com/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #050510;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .loader {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        .loader h1 {
            font-size: 1.2rem;
            letter-spacing: 0.15em;
            font-weight: 300;
            opacity: 0.7;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
    <script>
        // Redirect to main site stories page
        window.location.replace('https://infiniteyatra.com/stories');
    </script>
</head>

<body>
    <div class="loader">
        <div class="spinner"></div>
        <h1>Loading Infinite Yatra Blog...</h1>
        <noscript>
            <p style="margin-top:20px"><a href="https://infiniteyatra.com/stories" style="color:#3b82f6">Click here to
                    visit our blog</a></p>
        </noscript>
    </div>
</body>

</html>
